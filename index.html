<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SN Search Generator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap');
  :root{
    --bg:#0f0f0f;--surface:#1a1a1a;--surface2:#242424;
    --border:#2e2e2e;--border2:#3a3a3a;
    --text:#e8e8e0;--text2:#888880;--text3:#555550;
    --accent:#c8f060;--accent2:#60c8f0;--accent3:#f0a060;
    --slack:#4ac578;--danger:#f06060;
    --mono:'IBM Plex Mono',monospace;--sans:'Syne',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;display:flex;flex-direction:column;}
  header{padding:14px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;}
  .logo{font-size:13px;font-weight:600;letter-spacing:.12em;color:var(--accent);font-family:var(--mono);}
  .logo span{color:var(--text2);}
  .slack-setting{display:flex;align-items:center;gap:6px;margin-left:auto;}
  .slack-setting label{font-family:var(--mono);font-size:10px;color:var(--text3);white-space:nowrap;}
  .slack-setting input{background:var(--surface);border:1px solid var(--border);border-radius:4px;color:var(--text2);font-family:var(--mono);font-size:10px;padding:4px 8px;outline:none;width:240px;transition:border-color .2s;}
  .slack-setting input:focus{border-color:var(--slack);}
  .slack-setting button{font-family:var(--mono);font-size:10px;padding:4px 8px;border:1px solid var(--border2);border-radius:4px;background:transparent;color:var(--text3);cursor:pointer;transition:all .15s;white-space:nowrap;}
  .slack-setting button:hover{border-color:var(--slack);color:var(--slack);}
  .slack-setting button.ok{border-color:var(--slack);color:var(--slack);}
  .step-bar{display:flex;gap:4px;align-items:center;font-family:var(--mono);font-size:11px;color:var(--text3);}
  .step-bar .s{padding:3px 8px;border-radius:3px;transition:all .2s;}
  .step-bar .s.active{background:var(--accent);color:#0f0f0f;font-weight:500;}
  .step-bar .s.done{color:var(--accent);}
  .step-bar .sep{color:var(--border2);}
  main{flex:1;display:flex;}
  #step1{width:100%;display:flex;flex-direction:column;}
  .input-area{flex:1;display:flex;flex-direction:column;padding:32px;max-width:800px;margin:0 auto;width:100%;}
  .sec-label{font-family:var(--mono);font-size:11px;color:var(--text3);letter-spacing:.1em;margin-bottom:8px;}
  h1{font-size:28px;font-weight:700;line-height:1.2;margin-bottom:6px;}
  h1 em{color:var(--accent);font-style:normal;}
  .desc{font-size:13px;color:var(--text2);margin-bottom:24px;line-height:1.6;font-family:var(--mono);}
  textarea{background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:12px;line-height:1.7;padding:16px;resize:vertical;min-height:260px;width:100%;outline:none;transition:border-color .2s;}
  textarea:focus{border-color:var(--accent);}
  textarea::placeholder{color:var(--text3);}
  .btn-row{display:flex;gap:10px;margin-top:14px;align-items:center;}
  .btn-primary{background:var(--accent);color:#0f0f0f;border:none;border-radius:6px;padding:12px 28px;font-family:var(--sans);font-size:14px;font-weight:600;cursor:pointer;transition:opacity .2s,transform .1s;}
  .btn-primary:hover{opacity:.88;}
  .btn-primary:active{transform:scale(.98);}
  .btn-primary:disabled{opacity:.4;cursor:not-allowed;}
  .btn-sec{background:transparent;color:var(--text2);border:1px solid var(--border2);border-radius:6px;padding:12px 20px;font-family:var(--sans);font-size:13px;cursor:pointer;transition:all .2s;}
  .btn-sec:hover{border-color:var(--text2);color:var(--text);}
  .err-box{background:rgba(240,96,96,.08);border:1px solid rgba(240,96,96,.3);border-radius:8px;padding:14px;font-family:var(--mono);font-size:12px;color:var(--danger);margin-top:12px;display:none;line-height:1.6;}
  .hint{font-family:var(--mono);font-size:11px;color:var(--text3);margin-top:10px;line-height:1.6;padding:10px 14px;background:var(--surface);border-radius:6px;border-left:2px solid var(--accent);}
  .loading-state{display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:60px;flex:1;}
  .spinner{width:40px;height:40px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-text{font-family:var(--mono);font-size:12px;color:var(--text2);}
  #step2{display:none;width:100%;flex-direction:column;}
  .res-header{padding:12px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;}
  .btn-back{background:transparent;border:1px solid var(--border2);color:var(--text2);border-radius:5px;padding:6px 14px;font-family:var(--mono);font-size:11px;cursor:pointer;transition:all .2s;}
  .btn-back:hover{border-color:var(--text2);color:var(--text);}
  .res-title{font-size:13px;font-weight:600;color:var(--text2);font-family:var(--mono);}
  .slack-all{font-family:var(--mono);font-size:11px;padding:7px 16px;border:1px solid rgba(74,197,120,.5);border-radius:6px;background:rgba(74,197,120,.08);color:var(--slack);cursor:pointer;transition:all .15s;margin-left:auto;}
  .slack-all:hover{background:rgba(74,197,120,.15);}
  .slack-all.sent{border-color:var(--accent);color:var(--accent);}
  .slack-all:disabled{opacity:.4;cursor:not-allowed;}
  .res-body{flex:1;overflow-y:auto;padding:24px 28px;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:16px;overflow:hidden;animation:fadeUp .3s ease both;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
  .card-head{padding:12px 16px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .letter{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--accent);background:rgba(200,240,96,.1);padding:2px 7px;border-radius:3px;flex-shrink:0;}
  .card-name{font-size:14px;font-weight:600;flex:1;}
  .card-cos{font-family:var(--mono);font-size:11px;color:var(--text2);width:100%;margin-top:2px;}
  .tag{display:inline-block;font-family:var(--mono);font-size:10px;padding:1px 6px;border-radius:3px;}
  .tag-strict{background:rgba(200,240,96,.12);color:var(--accent);}
  .tag-mid{background:rgba(96,200,240,.12);color:var(--accent2);}
  .tag-loose{background:rgba(240,160,96,.12);color:var(--accent3);}
  .card-body{padding:14px 16px;display:flex;gap:12px;align-items:flex-start;}
  .fields{flex:1;display:flex;flex-direction:column;gap:10px;min-width:0;}
  .f-label{font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:.08em;margin-bottom:4px;}
  .f-val{font-family:var(--mono);font-size:11px;color:var(--text);background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 10px;line-height:1.7;word-break:break-all;user-select:all;cursor:text;}
  .f-val.kw{color:var(--accent2);font-weight:500;}
  .actions{display:flex;flex-direction:column;gap:6px;flex-shrink:0;min-width:72px;}
  .cp-btn{font-family:var(--mono);font-size:10px;padding:6px 12px;border:1px solid var(--border2);border-radius:5px;background:transparent;color:var(--text2);cursor:pointer;white-space:nowrap;transition:all .15s;text-align:center;}
  .cp-btn:hover{border-color:var(--text2);color:var(--text);}
  .cp-btn.ok{border-color:var(--accent);color:var(--accent);}
  .open-btn{font-family:var(--mono);font-size:10px;padding:6px 12px;border:1px solid rgba(96,200,240,.4);border-radius:5px;background:transparent;color:var(--accent2);text-decoration:none;text-align:center;transition:all .15s;display:block;}
  .open-btn:hover{background:rgba(96,200,240,.08);}
  .slack-btn{font-family:var(--mono);font-size:10px;padding:6px 12px;border:1px solid rgba(74,197,120,.4);border-radius:5px;background:transparent;color:var(--slack);cursor:pointer;white-space:nowrap;transition:all .15s;text-align:center;}
  .slack-btn:hover{background:rgba(74,197,120,.08);}
  .slack-btn.ok{border-color:var(--accent);color:var(--accent);}
  .slack-btn:disabled{opacity:.4;cursor:not-allowed;}
</style>
</head>
<body>
<header>
  <div class="logo">SN<span>/</span>SEARCH<span>_</span>GEN</div>
  <div class="slack-setting">
    <label>Slack Webhook</label>
    <input type="password" id="webhookInput" placeholder="https://hooks.slack.com/services/...">
    <button id="saveWH" onclick="saveWebhook()">保存</button>
  </div>
  <div class="step-bar" style="margin-left:12px;">
    <span class="s active" id="s1">01 入力</span>
    <span class="sep">›</span>
    <span class="s" id="s2">02 生成</span>
  </div>
</header>

<main>
  <div id="step1" style="display:flex;flex-direction:column;width:100%;">
    <div class="input-area">
      <div class="sec-label">SALES NAVIGATOR SEARCH GENERATOR</div>
      <h1>案件情報を貼って<br><em>検索条件を自動生成</em></h1>
      <div class="desc">対象企業・調査テーマ・スクリーニング質問などをそのまま貼り付けてください。<br>業界グループ別にCurrent Company＋キーワードを自動で作成します。</div>
      <div class="sec-label">案件情報</div>
      <textarea id="input" placeholder="例）
■対象企業
・タカラスタンダード
・LIXIL
・竹中工務店

■ヒアリングテーマ
建材卸市場の構造、九州地場企業の競争優位性、価格転嫁..."></textarea>
      <div id="errBox" class="err-box"></div>
      <div class="btn-row">
        <button class="btn-primary" id="genBtn" onclick="generate()">検索条件を生成する →</button>
        <button class="btn-sec" onclick="document.getElementById('input').value=SAMPLE">サンプルを入力</button>
      </div>
      <div class="hint">💡 企業名・業界・テーマをそのまま貼るだけでOKです。失敗した場合は自動で再試行します。</div>
    </div>
    <div class="loading-state" id="loading">
      <div class="spinner"></div>
      <div class="loading-text" id="loadTxt">案件情報を分析中...</div>
    </div>
  </div>

  <div id="step2" style="display:none;flex-direction:column;width:100%;">
    <div class="res-header">
      <button class="btn-back" onclick="backToInput()">← 戻る</button>
      <div class="res-title" id="resTitle">検索条件 生成済み</div>
      <button class="slack-all" id="slackAll" onclick="postAll(this)">Slackに全投稿</button>
    </div>
    <div class="res-body" id="resBody"></div>
  </div>
</main>

<script>
const API_KEY='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';

const SAMPLE=`■対象企業
建材卸、建設会社、建材メーカー、商社建材部門等でご経験をお持ちの方を探しております。

__資材メーカー系__
・タカラスタンダード福岡支社
・LIXILビル
・YKK AP

__商社系__
・NSプロスチール建材
・ヨドコウ商事
・日鉄物産　九州支店

__大手ゼネコン__
・竹中工務店
・大成建設　九州支店

__卸/工事__
・セキノ興産
・渡辺パイプ
・小園硝子商会

■ヒアリングテーマ
・建材卸市場の構造
・九州地場企業の競争優位性や課題
・資材価格高騰時の価格転嫁

■対象エリア：九州`;

function saveWebhook(){
  const v=document.getElementById('webhookInput').value.trim();
  if(!v)return;
  localStorage.setItem('sn_wh',v);
  const b=document.getElementById('saveWH');
  b.textContent='済 ✓';b.classList.add('ok');
  setTimeout(()=>{b.textContent='保存';b.classList.remove('ok');},2000);
}
function getWebhook(){return document.getElementById('webhookInput').value.trim()||localStorage.getItem('sn_wh')||'';}
window.addEventListener('load',()=>{
  const w=localStorage.getItem('sn_wh');
  if(w)document.getElementById('webhookInput').value=w;
});

function backToInput(){
  document.getElementById('step2').style.display='none';
  document.getElementById('step1').style.display='flex';
  document.getElementById('s1').classList.add('active');
  document.getElementById('s2').classList.remove('active','done');
  document.getElementById('loading').style.display='none';
  document.querySelector('.input-area').style.display='flex';
}

const MSGS=['案件情報を分析中...','業界グループを分類中...','キーワードを生成中...','英語名を補完中...','検索条件を整理中...'];
let _li;
function startLoad(){let i=0;document.getElementById('loadTxt').textContent=MSGS[0];_li=setInterval(()=>{i=(i+1)%MSGS.length;document.getElementById('loadTxt').textContent=MSGS[i];},1800);}
function stopLoad(){clearInterval(_li);}

function buildPrompt(input){
  return `あなたはLinkedIn Sales Navigatorの検索条件を生成する専門家です。
以下の案件情報を分析して、業界グループ別の検索条件をJSON配列で出力してください。

【案件情報】
${input}

【出力形式】必ずJSON配列のみ返してください。説明文・マークダウン記号は一切不要です。
[
  {
    "groupName": "グループ名（日本語）",
    "companies": ["企業名1", "企業名2"],
    "companyBoolean": "\\"日本語社名\\" OR \\"English Name\\"",
    "keyword": "日本語キーワード OR English keyword",
    "keywordStrength": "strict または mid または loose",
    "keywordUrl": "https://www.linkedin.com/sales/search/people?keywords=URLエンコード済み"
  }
]

【グループ分けルール】業界カテゴリ別に最大8グループ。法人格（株式会社等）は除く。

【keywordStrengthとkeywordの指針】
- strict（500人以上の大手）: 職種を具体的に → 例: "資材調達 OR materials procurement"
- mid（100〜500人の中規模）: 職種＋業務 → 例: "建材 営業 OR building materials"
- loose（100人未満の小規模・地場）: 広めの職種 → 例: "営業 OR sales"

【URLエンコードルール】
- スペース → %20、" → %22、OR接続 → %20OR%20

重要: JSON配列以外は何も出力しないでください。`;
}

function extractJSON(text){
  try{return JSON.parse(text.trim());}catch(e){}
  const clean=text.replace(/```json\n?/g,'').replace(/```\n?/g,'').trim();
  try{return JSON.parse(clean);}catch(e){}
  const m=text.match(/\[[\s\S]*\]/);
  if(m){try{return JSON.parse(m[0]);}catch(e){}}
  throw new Error('JSONの解析に失敗しました');
}

let currentGroups=[];
async function generate(retryCount=0){
  const input=document.getElementById('input').value.trim();
  const errBox=document.getElementById('errBox');
  errBox.style.display='none';
  if(!input){errBox.textContent='案件情報を入力してください。';errBox.style.display='block';return;}

  document.getElementById('genBtn').disabled=true;
  document.querySelector('.input-area').style.display='none';
  document.getElementById('loading').style.display='flex';
  if(retryCount===0)startLoad();

  try{
    const res=await fetch('/api/claude',{
      method:'POST',
      headers:{
        'Content-Type':'application/json'
      },
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:4000,
        messages:[{role:'user',content:buildPrompt(input)}]
      })
    });

    if(!res.ok){
      const err=await res.json().catch(()=>({}));
      throw new Error(err.error?.message||`HTTPエラー ${res.status}`);
    }

    const data=await res.json();
    const text=data.content?.[0]?.text||'';
    const groups=extractJSON(text);
    if(!Array.isArray(groups)||groups.length===0)throw new Error('グループが取得できませんでした');

    stopLoad();
    document.getElementById('loading').style.display='none';
    renderResult(groups);

  }catch(e){
    if(retryCount<2){
      document.getElementById('loadTxt').textContent=`再試行中（${retryCount+1}/2）...`;
      await new Promise(r=>setTimeout(r,2000));
      return generate(retryCount+1);
    }
    stopLoad();
    document.getElementById('loading').style.display='none';
    document.querySelector('.input-area').style.display='flex';
    errBox.textContent=`生成に失敗しました（${e.message}）。もう一度お試しください。`;
    errBox.style.display='block';
    document.getElementById('genBtn').disabled=false;
  }
}

const LETTERS='ABCDEFGH';
const STR_LABEL={strict:'大手・厳密',mid:'中規模・バランス',loose:'小規模・緩め'};
const STR_CLASS={strict:'tag-strict',mid:'tag-mid',loose:'tag-loose'};

function renderResult(groups){
  currentGroups=groups;
  document.getElementById('step1').style.display='none';
  document.getElementById('step2').style.display='flex';
  document.getElementById('s1').classList.remove('active');document.getElementById('s1').classList.add('done');
  document.getElementById('s2').classList.add('active');
  document.getElementById('resTitle').textContent=`${groups.length}グループの検索条件を生成しました`;

  document.getElementById('resBody').innerHTML=`
    <div style="font-family:var(--mono);font-size:11px;color:var(--text3);margin-bottom:20px;padding:10px 14px;background:var(--surface);border-radius:6px;border-left:2px solid var(--accent);">
      ① 会社名コピー → SNのCurrent Companyに貼り付け　② KWコピー → SNキーワード検索窓に貼り付け　③「開く」で検索へ
    </div>
  `+groups.map((g,i)=>`
    <div class="card" style="animation-delay:${i*.06}s">
      <div class="card-head">
        <span class="letter">${LETTERS[i]||i+1}</span>
        <div class="card-name">${g.groupName}</div>
        <span class="tag ${STR_CLASS[g.keywordStrength]||'tag-mid'}">${STR_LABEL[g.keywordStrength]||''}</span>
        <div class="card-cos">${(g.companies||[]).join(' / ')}</div>
      </div>
      <div class="card-body">
        <div class="fields">
          <div><div class="f-label">CURRENT COMPANY — そのままコピペ</div><div class="f-val" id="co${i}">${esc(g.companyBoolean)}</div></div>
          <div><div class="f-label">KEYWORD — 検索窓にコピペ</div><div class="f-val kw" id="kw${i}">${esc(g.keyword)}</div></div>
        </div>
        <div class="actions">
          <button class="cp-btn" onclick="cp('co${i}',this)">会社名<br>コピー</button>
          <button class="cp-btn" onclick="cp('kw${i}',this)">KW<br>コピー</button>
          <a class="open-btn" href="${esc(g.keywordUrl)}" target="_blank">開く →</a>
          <button class="slack-btn" onclick="postOne(${i},this)">Slack<br>投稿</button>
        </div>
      </div>
    </div>
  `).join('');
  document.getElementById('genBtn').disabled=false;
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function cp(id,btn){
  navigator.clipboard.writeText(document.getElementById(id).innerText).then(()=>{
    const o=btn.innerHTML;btn.innerHTML='済 ✓';btn.classList.add('ok');
    setTimeout(()=>{btn.innerHTML=o;btn.classList.remove('ok');},2000);
  });
}

function buildMsg(g,l){
  return `*${l}｜${g.groupName}*\n対象企業：${(g.companies||[]).join(' / ')}\n\n*Current Company（コピペ用）*\n\`\`\`${g.companyBoolean}\`\`\`\n*キーワード（コピペ用）*\n\`\`\`${g.keyword}\`\`\`\n<${g.keywordUrl}|🔗 Sales Navigator で開く>`;
}

async function postOne(idx,btn){
  const wh=getWebhook();
  if(!wh){alert('右上にSlack Webhook URLを入力して「保存」してください。');return;}
  btn.disabled=true;btn.innerHTML='送信中...';
  try{
    await fetch(wh,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:buildMsg(currentGroups[idx],LETTERS[idx]||idx+1)}),mode:'no-cors'});
    btn.innerHTML='済 ✓';btn.classList.add('ok');
  }catch(e){btn.disabled=false;btn.innerHTML='Slack<br>投稿';alert('投稿に失敗しました。');}
}

async function postAll(btn){
  const wh=getWebhook();
  if(!wh){alert('右上にSlack Webhook URLを入力して「保存」してください。');return;}
  btn.disabled=true;btn.textContent='送信中...';
  const body=currentGroups.map((g,i)=>buildMsg(g,LETTERS[i]||i+1)).join('\n\n━━━━━━━━━━━━━━━━\n\n');
  try{
    await fetch(wh,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:`*SN検索条件 — ${currentGroups.length}グループ*\n━━━━━━━━━━━━━━━━\n\n`+body}),mode:'no-cors'});
